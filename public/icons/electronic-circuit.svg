  <path d="M20 80 L80 80 L80 160 L140 160" 
        stroke="url(#circuitGrad)" stroke-width="3" fill="none"/>
  <path d="M60 40 L60 20 L140 20 L140 40" 
        stroke="url(#circuitGrad)" stroke-width="3" fill="none"/>
  
  <!-- Components -->
  <rect x="35" y="32" width="16" height="16" fill="#10B981" rx="2"/>
  <rect x="95" y="72" width="16" height="16" fill="#F59E0B" rx="2"/>
  <rect x="155" y="112" width="16" height="16" fill="#EF4444" rx="2"/>
  <rect x="75" y="152" width="16" height="16" fill="#8B5CF6" rx="2"/>
  <rect x="125" y="32" width="16" height="16" fill="#06B6D4" rx="2"/>
  
  <!-- Connection points -->
  <circle cx="43" cy="40" r="3" fill="#60A5FA"/>
  <circle cx="103" cy="80" r="3" fill="#60A5FA"/>
  <circle cx="163" cy="120" r="3" fill="#60A5FA"/>
  <circle cx="83" cy="160" r="3" fill="#60A5FA"/>

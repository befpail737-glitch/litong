<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="analogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- IC Package -->
  <rect x="25" y="25" width="50" height="50" fill="url(#analogGrad)" rx="4"/>
  
  <!-- Analog waveform -->
  <g stroke="#FEF3C7" stroke-width="2" fill="none">
    <path d="M30 50 Q40 35 50 50 Q60 65 70 50"/>
  </g>
  
  <!-- Digital signal -->
  <g stroke="#FEF3C7" stroke-width="1.5" fill="none">
    <path d="M30 60 L35 60 L35 55 L45 55 L45 60 L55 60 L55 55 L65 55 L65 60 L70 60"/>
  </g>
  
  <!-- Pins -->
  <g fill="#374151">
    <rect x="35" y="20" width="3" height="8"/>
    <rect x="42" y="20" width="3" height="8"/>
    <rect x="49" y="20" width="3" height="8"/>
    <rect x="56" y="20" width="3" height="8"/>
    <rect x="63" y="20" width="3" height="8"/>
    
    <rect x="35" y="72" width="3" height="8"/>
    <rect x="42" y="72" width="3" height="8"/>
    <rect x="49" y="72" width="3" height="8"/>
    <rect x="56" y="72" width="3" height="8"/>
    <rect x="63" y="72" width="3" height="8"/>
    
    <rect x="20" y="35" width="8" height="3"/>
    <rect x="20" y="42" width="8" height="3"/>
    <rect x="20" y="49" width="8" height="3"/>
    <rect x="20" y="56" width="8" height="3"/>
    <rect x="20" y="63" width="8" height="3"/>
    
    <rect x="72" y="35" width="8" height="3"/>
    <rect x="72" y="42" width="8" height="3"/>
    <rect x="72" y="49" width="8" height="3"/>
    <rect x="72" y="56" width="8" height="3"/>
    <rect x="72" y="63" width="8" height="3"/>
  </g>
  
  <!-- A/D label -->
  <text x="50" y="42" font-family="Arial" font-size="8" text-anchor="middle" fill="#FEF3C7" font-weight="bold">A/D</text>
</svg>
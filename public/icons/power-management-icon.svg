<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="powerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Power IC -->
  <rect x="30" y="30" width="40" height="40" fill="url(#powerGrad)" rx="4"/>
  
  <!-- Heat sink fins -->
  <g fill="#6B7280">
    <rect x="25" y="25" width="50" height="3"/>
    <rect x="25" y="30" width="50" height="2"/>
    <rect x="25" y="34" width="50" height="2"/>
    <rect x="25" y="68" width="50" height="2"/>
    <rect x="25" y="72" width="50" height="3"/>
  </g>
  
  <!-- Pins -->
  <g fill="#374151">
    <rect x="45" y="20" width="4" height="10"/>
    <rect x="51" y="20" width="4" height="10"/>
    <rect x="45" y="70" width="4" height="10"/>
    <rect x="51" y="70" width="4" height="10"/>
    <rect x="20" y="45" width="10" height="4"/>
    <rect x="20" y="51" width="10" height="4"/>
    <rect x="70" y="45" width="10" height="4"/>
    <rect x="70" y="51" width="10" height="4"/>
  </g>
  
  <!-- Power symbol -->
  <circle cx="50" cy="50" r="8" fill="none" stroke="#F3F4F6" stroke-width="2"/>
  <path d="M50 42 V50 M46 46 L54 46" stroke="#F3F4F6" stroke-width="2" stroke-linecap="round"/>
</svg>
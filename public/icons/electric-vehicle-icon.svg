<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B7280;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Car body -->
  <path d="M40 60 Q40 50 50 50 L80 50 Q85 45 95 45 L120 45 Q125 45 130 50 L150 50 Q160 50 160 60 L160 85 Q160 90 155 90 L45 90 Q40 90 40 85 Z" fill="url(#carGrad)"/>
  
  <!-- Car roof -->
  <path d="M80 50 Q85 35 95 35 L120 35 Q125 35 130 50" fill="#1E40AF"/>
  
  <!-- Windows -->
  <path d="M85 40 Q90 40 95 40 L115 40 Q120 40 125 40 L125 50 L85 50 Z" fill="#60A5FA" opacity="0.8"/>
  
  <!-- Wheels -->
  <circle cx="60" cy="85" r="12" fill="#374151"/>
  <circle cx="60" cy="85" r="8" fill="#6B7280"/>
  <circle cx="60" cy="85" r="4" fill="#9CA3AF"/>
  
  <circle cx="140" cy="85" r="12" fill="#374151"/>
  <circle cx="140" cy="85" r="8" fill="#6B7280"/>
  <circle cx="140" cy="85" r="4" fill="#9CA3AF"/>
  
  <!-- Charging port -->
  <rect x="35" y="65" width="8" height="6" fill="#10B981" rx="1"/>
  <rect x="37" y="67" width="4" height="2" fill="#F3F4F6"/>
  
  <!-- Battery indicator -->
  <g transform="translate(70, 70)">
    <rect x="0" y="0" width="60" height="8" fill="#1F2937" rx="2"/>
    <rect x="2" y="2" width="56" height="4" fill="url(#batteryGrad)" rx="1"/>
    <text x="30" y="6" textAnchor="middle" fontSize="4" fill="#F3F4F6" fontFamily="Arial">85%</text>
  </g>
  
  <!-- Electric symbol -->
  <g transform="translate(100, 55)">
    <path d="M0 0 L4 0 L1 4 L3 4 L-1 8 L2 4 L0 4 Z" fill="#F59E0B"/>
  </g>
  
  <!-- BMS components -->
  <g transform="translate(20, 15)">
    <rect x="0" y="0" width="160" height="25" fill="#1F2937" rx="3"/>
    <rect x="3" y="3" width="154" height="19" fill="#374151" rx="2"/>
    
    <!-- Battery cells -->
    <g fill="#10B981">
      <rect x="8" y="6" width="8" height="13" rx="1"/>
      <rect x="20" y="6" width="8" height="13" rx="1"/>
      <rect x="32" y="6" width="8" height="13" rx="1"/>
      <rect x="44" y="6" width="8" height="13" rx="1"/>
      <rect x="56" y="6" width="8" height="13" rx="1"/>
      <rect x="68" y="6" width="8" height="13" rx="1"/>
      <rect x="80" y="6" width="8" height="13" rx="1"/>
      <rect x="92" y="6" width="8" height="13" rx="1"/>
      <rect x="104" y="6" width="8" height="13" rx="1"/>
      <rect x="116" y="6" width="8" height="13" rx="1"/>
      <rect x="128" y="6" width="8" height="13" rx="1"/>
      <rect x="140" y="6" width="8" height="13" rx="1"/>
    </g>
    
    <!-- BMS control unit -->
    <rect x="145" y="8" width="12" height="9" fill="#3B82F6" rx="1"/>
    <circle cx="149" cy="10" r="1" fill="#60A5FA"/>
    <circle cx="153" cy="10" r="1" fill="#10B981"/>
    <rect x="147" y="13" width="8" height="2" fill="#60A5FA" rx="0.5"/>
  </g>
  
  <!-- Connection wires -->
  <g stroke="#F59E0B" strokeWidth="2" fill="none">
    <path d="M45 65 Q50 60 55 55 Q60 50 65 45"/>
    <path d="M135 65 Q130 60 125 55 Q120 50 115 45"/>
  </g>
  
  <!-- Charging indicator -->
  <g transform="translate(165, 55)">
    <rect x="0" y="0" width="12" height="20" fill="#374151" rx="2"/>
    <rect x="2" y="2" width="8" height="16" fill="#1F2937" rx="1"/>
    <rect x="3" y="4" width="6" height="3" fill="#10B981"/>
    <rect x="3" y="8" width="6" height="3" fill="#10B981"/>
    <rect x="3" y="12" width="6" height="3" fill="#6B7280"/>
    <text x="6" y="22" textAnchor="middle" fontSize="4" fill="#10B981" fontFamily="Arial">CHARGING</text>
  </g>
  
  <!-- Ground line -->
  <line x1="0" y1="110" x2="200" y2="110" stroke="#6B7280" strokeWidth="2"/>
</svg>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Microcontroller chip -->
  <rect x="20" y="20" width="60" height="60" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="28" y="28" width="44" height="44" rx="2" fill="#DBEAFE"/>
  
  <!-- Internal circuit pattern -->
  <g stroke="#3B82F6" stroke-width="1.5" fill="none">
    <path d="M35 35h30M35 42h30M35 49h30M35 56h30M35 63h30"/>
    <path d="M40 35v28M47 35v28M53 35v28M60 35v28"/>
  </g>
  
  <!-- Connection points -->
  <circle cx="40" cy="40" r="1.5" fill="#1D4ED8"/>
  <circle cx="50" cy="40" r="1.5" fill="#1D4ED8"/>
  <circle cx="60" cy="40" r="1.5" fill="#1D4ED8"/>
  <circle cx="40" cy="50" r="1.5" fill="#1D4ED8"/>
  <circle cx="50" cy="50" r="1.5" fill="#1D4ED8"/>
  <circle cx="60" cy="50" r="1.5" fill="#1D4ED8"/>
  <circle cx="40" cy="60" r="1.5" fill="#1D4ED8"/>
  <circle cx="50" cy="60" r="1.5" fill="#1D4ED8"/>
  <circle cx="60" cy="60" r="1.5" fill="#1D4ED8"/>
  
  <!-- External pins -->
  <g fill="#6B7280">
    <!-- Left pins -->
    <rect x="12" y="28" width="8" height="3"/>
    <rect x="12" y="35" width="8" height="3"/>
    <rect x="12" y="42" width="8" height="3"/>
    <rect x="12" y="49" width="8" height="3"/>
    <rect x="12" y="56" width="8" height="3"/>
    <rect x="12" y="63" width="8" height="3"/>
    
    <!-- Right pins -->
    <rect x="80" y="28" width="8" height="3"/>
    <rect x="80" y="35" width="8" height="3"/>
    <rect x="80" y="42" width="8" height="3"/>
    <rect x="80" y="49" width="8" height="3"/>
    <rect x="80" y="56" width="8" height="3"/>
    <rect x="80" y="63" width="8" height="3"/>
    
    <!-- Top pins -->
    <rect x="28" y="12" width="3" height="8"/>
    <rect x="35" y="12" width="3" height="8"/>
    <rect x="42" y="12" width="3" height="8"/>
    <rect x="49" y="12" width="3" height="8"/>
    <rect x="56" y="12" width="3" height="8"/>
    <rect x="63" y="12" width="3" height="8"/>
    
    <!-- Bottom pins -->
    <rect x="28" y="80" width="3" height="8"/>
    <rect x="35" y="80" width="3" height="8"/>
    <rect x="42" y="80" width="3" height="8"/>
    <rect x="49" y="80" width="3" height="8"/>
    <rect x="56" y="80" width="3" height="8"/>
    <rect x="63" y="80" width="3" height="8"/>
  </g>
  
  <!-- Pin 1 indicator -->
  <circle cx="25" cy="25" r="2" fill="#F59E0B"/>
</svg>
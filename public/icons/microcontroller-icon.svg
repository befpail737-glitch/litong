<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="mcuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- MCU Package -->
  <rect x="25" y="25" width="50" height="50" fill="url(#mcuGrad)" rx="4"/>
  <rect x="30" y="30" width="40" height="40" fill="#1F2937" rx="2"/>
  
  <!-- Pins -->
  <g stroke="#374151" stroke-width="2" fill="#374151">
    <!-- Top pins -->
    <rect x="32" y="20" width="3" height="10"/>
    <rect x="40" y="20" width="3" height="10"/>
    <rect x="48" y="20" width="3" height="10"/>
    <rect x="56" y="20" width="3" height="10"/>
    <rect x="64" y="20" width="3" height="10"/>
    
    <!-- Bottom pins -->
    <rect x="32" y="70" width="3" height="10"/>
    <rect x="40" y="70" width="3" height="10"/>
    <rect x="48" y="70" width="3" height="10"/>
    <rect x="56" y="70" width="3" height="10"/>
    <rect x="64" y="70" width="3" height="10"/>
    
    <!-- Left pins -->
    <rect x="20" y="32" width="10" height="3"/>
    <rect x="20" y="40" width="10" height="3"/>
    <rect x="20" y="48" width="10" height="3"/>
    <rect x="20" y="56" width="10" height="3"/>
    <rect x="20" y="64" width="10" height="3"/>
    
    <!-- Right pins -->
    <rect x="70" y="32" width="10" height="3"/>
    <rect x="70" y="40" width="10" height="3"/>
    <rect x="70" y="48" width="10" height="3"/>
    <rect x="70" y="56" width="10" height="3"/>
    <rect x="70" y="64" width="10" height="3"/>
  </g>
  
  <!-- Chip label -->
  <circle cx="35" cy="35" r="2" fill="#60A5FA"/>
  <text x="50" y="55" font-family="Arial" font-size="8" text-anchor="middle" fill="#60A5FA">MCU</text>
</svg>
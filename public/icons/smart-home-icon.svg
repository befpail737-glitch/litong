<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <defs>
    <linearGradient id="homeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- House structure -->
  <path d="M100 25 L40 65 L40 130 L160 130 L160 65 L100 25 Z" fill="url(#homeGrad)"/>
  <path d="M100 35 L50 70 L50 120 L150 120 L150 70 L100 35 Z" fill="#065F46"/>
  
  <!-- Roof -->
  <path d="M100 25 L40 65 L45 65 L100 30 L155 65 L160 65 L100 25 Z" fill="#374151"/>
  
  <!-- Door -->
  <rect x="90" y="100" width="20" height="30" fill="#8B5CF6" rx="2"/>
  <circle cx="105" cy="115" r="1.5" fill="#F3F4F6"/>
  
  <!-- Windows -->
  <rect x="60" y="85" width="15" height="15" fill="#60A5FA" rx="1"/>
  <rect x="125" y="85" width="15" height="15" fill="#60A5FA" rx="1"/>
  <line x1="67.5" y1="85" x2="67.5" y2="100" stroke="#1E40AF" strokeWidth="1"/>
  <line x1="60" y1="92.5" x2="75" y2="92.5" stroke="#1E40AF" strokeWidth="1"/>
  <line x1="132.5" y1="85" x2="132.5" y2="100" stroke="#1E40AF" strokeWidth="1"/>
  <line x1="125" y1="92.5" x2="140" y2="92.5" stroke="#1E40AF" strokeWidth="1"/>
  
  <!-- Smart devices -->
  <!-- WiFi router -->
  <g transform="translate(20, 40)">
    <rect x="0" y="0" width="25" height="15" fill="url(#deviceGrad)" rx="3"/>
    <rect x="3" y="3" width="19" height="9" fill="#1F2937" rx="1"/>
    <circle cx="6" cy="6" r="1" fill="#10B981"/>
    <circle cx="9" cy="6" r="1" fill="#F59E0B"/>
    <!-- WiFi signals -->
    <g stroke="#60A5FA" strokeWidth="1.5" fill="none" opacity="0.8">
      <path d="M15 20 Q20 15 25 20"/>
      <path d="M17 22 Q20 19 23 22"/>
      <path d="M19 24 Q20 23 21 24"/>
    </g>
  </g>
  
  <!-- Smart thermostat -->
  <g transform="translate(170, 85)">
    <circle cx="0" cy="0" r="12" fill="url(#deviceGrad)"/>
    <circle cx="0" cy="0" r="8" fill="#1F2937"/>
    <text x="0" y="2" textAnchor="middle" fontSize="6" fill="#60A5FA" fontFamily="Arial">24°</text>
  </g>
  
  <!-- Security camera -->
  <g transform="translate(45, 50)">
    <rect x="0" y="0" width="12" height="8" fill="#374151" rx="2"/>
    <circle cx="6" cy="4" r="3" fill="#1F2937"/>
    <circle cx="6" cy="4" r="2" fill="#60A5FA"/>
    <rect x="4" y="-2" width="4" height="2" fill="#6B7280"/>
  </g>
  
  <!-- Smart speaker -->
  <g transform="translate(150, 105)">
    <cylinder cx="0" cy="0" rx="6" ry="3" height="12" fill="#6B7280"/>
    <rect x="-6" y="0" width="12" height="12" fill="url(#deviceGrad)" rx="6"/>
    <circle cx="0" cy="6" r="3" fill="#1F2937"/>
    <circle cx="0" cy="6" r="1" fill="#10B981"/>
  </g>
  
  <!-- Motion sensor -->
  <g transform="translate(130, 70)">
    <rect x="0" y="0" width="8" height="6" fill="#F3F4F6" rx="1"/>
    <circle cx="4" cy="3" r="2" fill="#EF4444"/>
    <g opacity="0.6">
      <path d="M4 1 Q8 3 4 5 Q0 3 4 1" fill="none" stroke="#EF4444" strokeWidth="0.5"/>
    </g>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#60A5FA" strokeWidth="1" strokeDasharray="2,2" fill="none" opacity="0.5">
    <line x1="32" y1="47" x2="90" y2="85"/>
    <line x1="32" y1="47" x2="170" y2="85"/>
    <line x1="32" y1="47" x2="150" y2="110"/>
    <line x1="32" y1="47" x2="134" y2="73"/>
    <line x1="32" y1="47" x2="51" y2="58"/>
  </g>
  
  <!-- Ground line -->
  <line x1="0" y1="140" x2="200" y2="140" stroke="#6B7280" strokeWidth="2"/>
</svg>
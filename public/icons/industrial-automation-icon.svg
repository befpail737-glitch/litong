<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <defs>
    <linearGradient id="industrialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Factory building -->
  <rect x="20" y="60" width="160" height="80" fill="url(#industrialGrad)" rx="4"/>
  <rect x="30" y="70" width="140" height="60" fill="#1F2937" rx="2"/>
  
  <!-- Smokestacks -->
  <rect x="40" y="30" width="8" height="40" fill="#6B7280"/>
  <rect x="55" y="25" width="8" height="45" fill="#6B7280"/>
  <rect x="70" y="35" width="8" height="35" fill="#6B7280"/>
  
  <!-- Smoke -->
  <g opacity="0.6">
    <circle cx="44" cy="22" r="3" fill="#9CA3AF"/>
    <circle cx="59" cy="17" r="3" fill="#9CA3AF"/>
    <circle cx="74" cy="27" r="3" fill="#9CA3AF"/>
    <circle cx="47" cy="15" r="2" fill="#D1D5DB"/>
    <circle cx="62" cy="12" r="2" fill="#D1D5DB"/>
    <circle cx="77" cy="20" r="2" fill="#D1D5DB"/>
  </g>
  
  <!-- Windows -->
  <g fill="#60A5FA">
    <rect x="45" y="85" width="15" height="15" rx="1"/>
    <rect x="70" y="85" width="15" height="15" rx="1"/>
    <rect x="95" y="85" width="15" height="15" rx="1"/>
    <rect x="120" y="85" width="15" height="15" rx="1"/>
    <rect x="45" y="105" width="15" height="15" rx="1"/>
    <rect x="70" y="105" width="15" height="15" rx="1"/>
    <rect x="95" y="105" width="15" height="15" rx="1"/>
    <rect x="120" y="105" width="15" height="15" rx="1"/>
  </g>
  
  <!-- Robotic arm -->
  <g transform="translate(140, 80)">
    <rect x="0" y="15" width="6" height="25" fill="url(#machineGrad)" rx="3"/>
    <rect x="6" y="20" width="20" height="4" fill="url(#machineGrad)" rx="2"/>
    <rect x="26" y="15" width="4" height="12" fill="url(#machineGrad)" rx="2"/>
    <circle cx="28" cy="13" r="3" fill="#F59E0B"/>
  </g>
  
  <!-- Conveyor belt -->
  <rect x="20" y="135" width="160" height="8" fill="#4B5563" rx="4"/>
  <g fill="#374151">
    <circle cx="30" cy="139" r="2"/>
    <circle cx="50" cy="139" r="2"/>
    <circle cx="70" cy="139" r="2"/>
    <circle cx="90" cy="139" r="2"/>
    <circle cx="110" cy="139" r="2"/>
    <circle cx="130" cy="139" r="2"/>
    <circle cx="150" cy="139" r="2"/>
    <circle cx="170" cy="139" r="2"/>
  </g>
  
  <!-- Control panel -->
  <g transform="translate(85, 75)">
    <rect x="0" y="0" width="30" height="20" fill="#1F2937" rx="2"/>
    <rect x="3" y="3" width="24" height="14" fill="#374151" rx="1"/>
    <circle cx="8" cy="7" r="1.5" fill="#10B981"/>
    <circle cx="13" cy="7" r="1.5" fill="#F59E0B"/>
    <circle cx="18" cy="7" r="1.5" fill="#EF4444"/>
    <rect x="5" y="11" width="20" height="2" fill="#60A5FA" rx="1"/>
    <rect x="5" y="14" width="15" height="2" fill="#60A5FA" rx="1"/>
  </g>
</svg>
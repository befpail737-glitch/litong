<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子元件核心代理 | 提供正品原装现货 | LiTong</title>
    <meta name="description" content="力通是电子元件核心代理，长期稳定供应提供正品原装现货。并提供技术支持和优势价格，欢迎咨询。">
    <script>
        // 自动重定向到默认语言（中文）
        (function() {
            // 获取浏览器语言偏好
            var userLang = navigator.language || navigator.userLanguage;
            var supportedLangs = ['zh', 'en', 'ja', 'ko', 'ru', 'vi', 'fr', 'de', 'it', 'tr', 'ar'];
            var defaultLang = 'zh';
            var targetLang = defaultLang;
            
            // 尝试匹配用户语言
            if (userLang) {
                var langCode = userLang.toLowerCase().split('-')[0];
                if (supportedLangs.indexOf(langCode) !== -1) {
                    targetLang = langCode;
                }
            }
            
            // 重定向到对应语言页面
            window.location.replace('/' + targetLang + '/');
        })();
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1>LiTong Electronics</h1>
        <p>Redirecting to your language...</p>
        <p>正在跳转到您的语言版本...</p>
        <p><a href="/zh/">中文</a> | <a href="/en/">English</a> | <a href="/ja/">日本語</a></p>
    </div>
</body>
</html>

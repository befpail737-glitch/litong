<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="1; url=/zh/">
    <title>LiTong Electronics - 力通电子</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { 
            text-align: center; 
            max-width: 600px; 
            padding: 2rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 1rem; 
            font-weight: 300;
        }
        .subtitle { 
            font-size: 1.2rem; 
            margin-bottom: 2rem; 
            opacity: 0.9;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
        }
        .link:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LiTong Electronics</h1>
        <h2>力通电子</h2>
        <p class="subtitle">专业电子元件代理商</p>
        
        <div style="margin: 2rem 0;">
            <div class="loading"></div>
            <span>正在跳转到中文网站...</span>
        </div>
        
        <div class="links">
            <a href="/zh/" class="link">中文网站</a>
            <a href="/en/" class="link">English</a>
            <a href="/ja/" class="link">日本語</a>
            <a href="/ko/" class="link">한국어</a>
        </div>
    </div>
    
    <script>
        // 立即重定向
        window.location.replace('/zh/');
    </script>
</body>
</html>

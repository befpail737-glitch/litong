<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiTong Electronics - 力通电子</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .header { background-color: #1e40af; color: white; padding: 1rem 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .hero { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; padding: 4rem 0; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; margin-bottom: 2rem; }
        .btn { display: inline-block; background-color: #ffffff; color: #1e40af; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-right: 1rem; }
        .btn:hover { background-color: #f3f4f6; }
        .features { padding: 4rem 0; background-color: white; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .feature-card { text-align: center; padding: 2rem; background-color: #f9fafb; border-radius: 10px; }
        .footer { background-color: #1f2937; color: white; padding: 2rem 0; text-align: center; }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 2rem; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div>
                    <h2>LiTong Electronics</h2>
                </div>
                <div class="nav-links">
                    <a href="/zh/">中文</a>
                    <a href="/en/">English</a>
                    <a href="/ja/">日本語</a>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>专业电子元件代理商</h1>
            <p>力通电子 - 正品原装现货 · 技术支持 · 优势价格</p>
            <a href="/zh/" class="btn">进入中文网站</a>
            <a href="/en/" class="btn">Enter English Site</a>
        </div>
    </section>

    <section class="features">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 3rem; color: #1f2937;">为什么选择力通电子</h2>
            <div class="features-grid">
                <div class="feature-card">
                    <h3>库存深度</h3>
                    <p>超过10万种现货库存，满足各种需求</p>
                </div>
                <div class="feature-card">
                    <h3>正品保证</h3>
                    <p>所有产品均为原装正品，提供数字证书追踪</p>
                </div>
                <div class="feature-card">
                    <h3>技术支持</h3>
                    <p>专业FAE团队提供选型指导和技术支持</p>
                </div>
                <div class="feature-card">
                    <h3>快速物流</h3>
                    <p>全球仓储布局，快速响应客户需求</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 LiTong Electronics. 电子元件代理 | 芯片现货供应商</p>
        </div>
    </footer>

    <script>
        // 自动重定向到中文版本
        setTimeout(function() {
            if (confirm('是否跳转到中文网站？\nWould you like to go to the Chinese website?')) {
                window.location.href = '/zh/';
            }
        }, 3000);
    </script>
</body>
</html>

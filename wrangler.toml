# Cloudflare Pages Configuration - 专为Pages项目优化
name = "litong-electronics"
compatibility_date = "2024-01-01"

# Pages 构建输出目录
pages_build_output_dir = "out"

# GitHub Actions 自动部署配置
# 当使用GitHub Actions时，这些设置确保正确的构建行为

# 兼容性设置 - 增强Node.js支持
compatibility_flags = ["nodejs_compat", "streams_enable_constructors"]

# 生产环境配置 - 用于Cloudflare Pages部署
[env.production]
# 基础构建配置
NODE_ENV = "production"
NEXT_PUBLIC_SITE_URL = "https://litong.pages.dev"
NEXT_PHASE = "phase-production-build"
EMERGENCY_BUILD = "true"
NEXT_TELEMETRY_DISABLED = "1"
# 构建优化设置
NEXT_BUILD_LINT = "false"
NEXT_DISABLE_STATIC_IMAGES = "false"
NEXT_IMAGES_FALLBACK = "true"
BUILD_STAGE = "partial"
# Sanity CMS 配置
SANITY_PROJECT_ID = "oquvb2bs"
SANITY_DATASET = "production"
SANITY_API_VERSION = "2023-05-03"
# GitHub Actions标识
GITHUB_ACTIONS_BUILD = "true"

# 开发环境配置
[env.development]
NODE_ENV = "development"
NEXT_PUBLIC_SITE_URL = "http://localhost:3000"
NEXT_TELEMETRY_DISABLED = "1"
SANITY_PROJECT_ID = "oquvb2bs"
SANITY_DATASET = "production"
SANITY_API_VERSION = "2023-05-03"
GITHUB_ACTIONS_BUILD = "false"